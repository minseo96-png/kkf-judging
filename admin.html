<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KKF 관리자 페이지</title>

<style>
body { font-family: Arial; padding:20px; max-width:600px; }
input { width:100%; padding:10px; margin-top:5px; }
button { margin-top:15px; padding:10px; background:black; color:white; border:none; }
table { margin-top:20px; width:100%; border-collapse: collapse; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
</style>
</head>

<body>

<h2>참가자 등록 (관리자)</h2>

<label>회차번호</label>
<input id="examId" placeholder="예: 1789">

<label>참가번호</label>
<input id="number">

<label>이름</label>
<input id="name">

<label>생년월일</label>
<input id="birth">

<label>응시클립</label>
<input id="clip">

<label>견종</label>
<input id="dog">

<button onclick="saveParticipant()">저장</button>


<h2>회차별 조회</h2>

<label>회차번호 입력</label>
<input id="searchExam">

<button onclick="loadExam()">조회</button>

<table id="adminTable">
<tr>
<th>번호</th>
<th>이름</th>
<th>생년월일</th>
<th>클립</th>
<th>견종</th>
</tr>
</table>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNDyv2AUlu_wGwdhri4dsG1bu4MGzqjg",
  authDomain: "kkf-judging-system.firebaseapp.com",
  projectId: "kkf-judging-system",
  storageBucket: "kkf-judging-system.firebasestorage.app",
  messagingSenderId: "1058615594389",
  appId: "1:1058615594389:web:524e946532fa8bdc04fa9c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🔥 참가자 저장 (회차별)
window.saveParticipant = async function () {

  const examId = document.getElementById("examId").value;
  const number = document.getElementById("number").value;

  if (!examId || !number) {
    alert("회차랑 번호 입력하세요");
    return;
  }

  await setDoc(doc(db, "exams", examId, "participants", number), {
    name: document.getElementById("name").value,
    birth: document.getElementById("birth").value,
    clip: document.getElementById("clip").value,
    dog: document.getElementById("dog").value
  });

  alert("저장 완료!");
};


// 🔥 회차별 조회
window.loadExam = async function () {

  const examId = document.getElementById("searchExam").value;

  const table = document.getElementById("adminTable");
  table.innerHTML = `
    <tr>
      <th>번호</th>
      <th>이름</th>
      <th>생년월일</th>
      <th>클립</th>
      <th>견종</th>
    </tr>
  `;

  const snapshot = await getDocs(collection(db, "exams", examId, "participants"));

  snapshot.forEach(docItem => {
    const d = docItem.data();

    table.innerHTML += `
      <tr>
        <td>${docItem.id}</td>
        <td>${d.name}</td>
        <td>${d.birth}</td>
        <td>${d.clip}</td>
        <td>${d.dog}</td>
      </tr>
    `;
  });
};

</script>

</body>
</html>
