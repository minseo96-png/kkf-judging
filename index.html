<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNDyv2AUlu_wGwdhri4dsG1bu4MGzqjg",
    authDomain: "kkf-judging-system.firebaseapp.com",
    projectId: "kkf-judging-system",
    storageBucket: "kkf-judging-system.firebasestorage.app",
    messagingSenderId: "1058615594389",
    appId: "1:1058615594389:web:524e946532fa8bdc04fa9c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 점수 저장
  window.save = async function () {
    let judge = document.getElementById("judge").value;
    let number = document.getElementById("number").value;
    let score = document.getElementById("score").value;

    if (number === "" || score === "") {
      alert("값 입력해주세요");
      return;
    }

    await addDoc(collection(db, "scores"), {
      judge,
      number,
      score: Number(score),
      time: new Date()
    });

    alert("저장 완료!");
  };

  // 결과 불러오기 (평균 + 정렬)
  window.loadData = async function () {
    const querySnapshot = await getDocs(collection(db, "scores"));

    let data = {};

    querySnapshot.forEach((doc) => {
      let d = doc.data();

      if (!data[d.number]) {
        data[d.number] = [];
      }
      data[d.number].push(d.score);
    });

    let result = [];

    for (let num in data) {
      let scores = data[num];
      let avg = scores.reduce((a, b) => a + b, 0) / scores.length;

      result.push({
        number: num,
        avg: avg.toFixed(2)
      });
    }

    // 평균 기준 정렬
    result.sort((a, b) => b.avg - a.avg);

    let table = document.getElementById("resultTable");
    table.innerHTML = `
      <tr>
        <th>참가번호</th>
        <th>평균점수</th>
      </tr>
    `;

    result.forEach(r => {
      table.innerHTML += `
        <tr>
          <td>${r.number}</td>
          <td>${r.avg}</td>
        </tr>
      `;
    });
  };
</script>
