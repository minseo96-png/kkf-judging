<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKF 심사 시스템</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
    }

    h2 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      max-width: 260px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 18px;
      padding: 12px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f3f3f3;
    }
  </style>
</head>

<body>

<h2>KKF 심사 입력</h2>

<label>심사위원</label>
<select id="judge">
  <option value="심사위원1">심사위원1</option>
  <option value="심사위원2">심사위원2</option>
</select>

<label>참가자 번호</label>
<input type="text" id="number">

<label>이름</label>
<input type="text" id="name">

<label>생년월일</label>
<input type="text" id="birth">

<label>응시클립</label>
<input type="text" id="clip">

<label>견종</label>
<input type="text" id="dog">

<label>점수</label>
<input type="number" id="score">

<button onclick="saveData()">제출</button>


<h2>결과 보기</h2>
<button onclick="loadData()">결과 불러오기</button>

<table id="resultTable">
  <tr>
    <th>참가번호</th>
    <th>이름</th>
    <th>평균점수</th>
  </tr>
</table>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNDyv2AUlu_wGwdhri4dsG1bu4MGzqjg",
  authDomain: "kkf-judging-system.firebaseapp.com",
  projectId: "kkf-judging-system",
  storageBucket: "kkf-judging-system.firebasestorage.app",
  messagingSenderId: "1058615594389",
  appId: "1:1058615594389:web:524e946532fa8bdc04fa9c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ✅ 저장
window.saveData = async function () {
  const judge = document.getElementById("judge").value;
  const number = document.getElementById("number").value.trim();
  const name = document.getElementById("name").value.trim();
  const birth = document.getElementById("birth").value.trim();
  const clip = document.getElementById("clip").value.trim();
  const dog = document.getElementById("dog").value.trim();
  const score = document.getElementById("score").value.trim();

  if (number === "" || score === "") {
    alert("참가번호와 점수 입력해주세요");
    return;
  }

  await addDoc(collection(db, "scores"), {
    judge,
    number,
    name,
    birth,
    clip,
    dog,
    score: Number(score),
    time: new Date().toISOString()
  });

  alert("저장 완료!");

  document.getElementById("number").value = "";
  document.getElementById("score").value = "";
};


// ✅ 결과 불러오기 (평균 + 정렬)
window.loadData = async function () {

  const snapshot = await getDocs(collection(db, "scores"));
  let grouped = {};

  snapshot.forEach(doc => {
    const d = doc.data();

    if (!d.number || isNaN(d.score)) return;

    if (!grouped[d.number]) {
      grouped[d.number] = {
        name: d.name || "",
        scores: []
      };
    }

    grouped[d.number].scores.push(Number(d.score));
  });

  let result = [];

  for (let num in grouped) {
    let scores = grouped[num].scores;
    let avg = scores.reduce((a,b)=>a+b,0) / scores.length;

    result.push({
      number: num,
      name: grouped[num].name,
      avg: avg.toFixed(2)
    });
  }

  result.sort((a,b)=> b.avg - a.avg);

  let table = document.getElementById("resultTable");

  table.innerHTML = `
    <tr>
      <th>참가번호</th>
      <th>이름</th>
      <th>평균점수</th>
    </tr>
  `;

  result.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.number}</td>
        <td>${r.name}</td>
        <td>${r.avg}</td>
      </tr>
    `;
  });

};
</script>

</body>
</html>
